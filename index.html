<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .weather-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .temp {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        .desc {
            color: #666;
            text-transform: capitalize;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .city-name {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .loading {
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather Forecast</h1>
        
        <form id="weatherForm">
            <input type="text" id="cityInput" placeholder="Enter city name" value="Johannesburg">
            <button type="submit">Check</button>
        </form>
        
        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">Loading weather data...</div>
        
        <div id="results" style="display: none;">
            <div class="city-name" id="cityName"></div>
            
            <div class="weather-cards">
                <div class="card">
                    <h2>Today</h2>
                    <div class="temp" id="todayTemp"></div>
                    <div class="desc" id="todayDesc"></div>
                </div>
                
                <div class="card">
                    <h2>Tomorrow</h2>
                    <div class="temp" id="tomorrowTemp"></div>
                    <div class="desc" id="tomorrowDesc"></div>
                </div>
            </div>
        </div>
        
        <p id="placeholder" style="text-align: center; color: #666;">Enter a city name to see the weather!</p>
    </div>

    <script>
        // Using wttr.in weather API (free, no API key needed)
        async function getWeather(city) {
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const resultsDiv = document.getElementById('results');
            const placeholder = document.getElementById('placeholder');
            
            errorDiv.style.display = 'none';
            resultsDiv.style.display = 'none';
            placeholder.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            try {
                // Fetch current weather using wttr.in
                const response = await fetch(`https://wttr.in/${city}?format=j1`);
                
                if (!response.ok) {
                    throw new Error('City not found. Please try a different city name.');
                }
                
                const data = await response.json();
                
                // Current weather (today)
                const current = data.current_condition[0];
                const todayTemp = current.temp_C;
                const todayDesc = current.weatherDesc[0].value;
                
                // Tomorrow's weather (next day in forecast)
                const tomorrow = data.weather[1];
                const tomorrowTemp = tomorrow.maxtempC + '° / ' + tomorrow.mintempC + '°';
                const tomorrowDesc = tomorrow.weatherDesc[0].value;
                
                // Update UI
                document.getElementById('cityName').textContent = '📍 ' + city;
                document.getElementById('todayTemp').textContent = todayTemp + '°C';
                document.getElementById('todayDesc').textContent = todayDesc;
                document.getElementById('tomorrowTemp').textContent = tomorrowTemp;
                document.getElementById('tomorrowDesc').textContent = tomorrowDesc;
                
                loadingDiv.style.display = 'none';
                resultsDiv.style.display = 'block';
                
            } catch (err) {
                loadingDiv.style.display = 'none';
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                placeholder.style.display = 'block';
            }
        }
        
        document.getElementById('weatherForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                getWeather(city);
            }
        });
        
        // Load default city on page load
        getWeather('Johannesburg');
    </script>
</body>
</html>
