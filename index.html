<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .weather-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .temp {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        .desc {
            color: #666;
            text-transform: capitalize;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .city-name {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .loading {
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather Forecast</h1>
        
        <form id="weatherForm">
            <input type="text" id="cityInput" placeholder="Enter city name" value="Johannesburg">
            <button type="submit">Check</button>
        </form>
        
        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">Loading weather data...</div>
        
        <div id="results" style="display: none;">
            <div class="city-name" id="cityName"></div>
            
            <div class="weather-cards">
                <div class="card">
                    <h2>Today</h2>
                    <div class="temp" id="todayTemp"></div>
                    <div class="desc" id="todayDesc"></div>
                </div>
                
                <div class="card">
                    <h2>Tomorrow</h2>
                    <div class="temp" id="tomorrowTemp"></div>
                    <div class="desc" id="tomorrowDesc"></div>
                </div>
            </div>
        </div>
        
        <p id="placeholder" style="text-align: center; color: #666;">Enter a city name to see the weather!</p>
    </div>

    <script>
        // Using Open-Meteo API (free, no API key, CORS enabled)
        // First we need to geocode the city, then get weather
        
        async function getCoordinates(city) {
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
            const response = await fetch(geoUrl);
            const data = await response.json();
            
            if (!data.results || data.results.length === 0) {
                throw new Error('City not found. Please try a different city name.');
            }
            
            return {
                lat: data.results[0].latitude,
                lon: data.results[0].longitude,
                name: data.results[0].name,
                country: data.results[0].country
            };
        }
        
        async function getWeather(lat, lon) {
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=2`;
            
            const response = await fetch(weatherUrl);
            const data = await response.json();
            
            return data;
        }
        
        function getWeatherDescription(code) {
            const codes = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Fog',
                48: 'Depositing rime fog',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with hail',
                99: 'Thunderstorm with heavy hail'
            };
            return codes[code] || 'Unknown';
        }
        
        async function getWeatherData(city) {
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const resultsDiv = document.getElementById('results');
            const placeholder = document.getElementById('placeholder');
            
            errorDiv.style.display = 'none';
            resultsDiv.style.display = 'none';
            placeholder.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            try {
                // Step 1: Get coordinates for the city
                const coords = await getCoordinates(city);
                
                // Step 2: Get weather data
                const weather = await getWeather(coords.lat, coords.lon);
                
                // Parse today's weather
                const todayCode = weather.daily.weather_code[0];
                const todayTemp = Math.round(weather.current.temperature_2m);
                const todayDesc = getWeatherDescription(todayCode);
                
                // Parse tomorrow's weather
                const tomorrowCode = weather.daily.weather_code[1];
                const tomorrowMax = Math.round(weather.daily.temperature_2m_max[1]);
                const tomorrowMin = Math.round(weather.daily.temperature_2m_min[1]);
                const tomorrowDesc = getWeatherDescription(tomorrowCode);
                
                // Update UI
                document.getElementById('cityName').textContent = '📍 ' + coords.name + ', ' + (coords.country || '');
                document.getElementById('todayTemp').textContent = todayTemp + '°C';
                document.getElementById('todayDesc').textContent = todayDesc;
                document.getElementById('tomorrowTemp').textContent = tomorrowMax + '° / ' + tomorrowMin + '°';
                document.getElementById('tomorrowDesc').textContent = tomorrowDesc;
                
                loadingDiv.style.display = 'none';
                resultsDiv.style.display = 'block';
                
            } catch (err) {
                loadingDiv.style.display = 'none';
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                placeholder.style.display = 'block';
            }
        }
        
        document.getElementById('weatherForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                getWeatherData(city);
            }
        });
        
        // Load default city on page load
        getWeatherData('Johannesburg');
    </script>
</body>
</html>
